services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + Dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  # One-shot: pull the dense embedding model into the ollama service, then exit.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["sh", "-c", "sleep 3 && ollama pull nomic-embed-text"]
    restart: "no"

volumes:
  ollama_models:
